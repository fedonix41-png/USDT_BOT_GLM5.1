services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: usdt_bot
      POSTGRES_USER: usdt_bot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usdt_bot"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  bot:
    build: .
    command: uv run python -m app.main
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://usdt_bot:${POSTGRES_PASSWORD:-secret}@postgres:5432/usdt_bot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  arq-worker:
    build: .
    command: uv run arq app.tasks.worker.WorkerSettings
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://usdt_bot:${POSTGRES_PASSWORD:-secret}@postgres:5432/usdt_bot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
