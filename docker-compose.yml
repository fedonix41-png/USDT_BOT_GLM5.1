services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: usdt_bot
      POSTGRES_USER: usdt_bot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usdt_bot"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  bot:
    build: .
    command: uv run python -m app.main
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://usdt_bot:${POSTGRES_PASSWORD:-secret}@postgres:5432/usdt_bot
      REDIS_URL: redis://redis:6379/0
      ARQ_REDIS_URL: redis://redis:6379/1
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  arq-worker:
    build: .
    command: uv run arq app.tasks.worker.WorkerSettings
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://usdt_bot:${POSTGRES_PASSWORD:-secret}@postgres:5432/usdt_bot
      REDIS_URL: redis://redis:6379/0
      ARQ_REDIS_URL: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: .
    command: uv run python -m app.api.app
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://usdt_bot:${POSTGRES_PASSWORD:-secret}@postgres:5432/usdt_bot
      REDIS_URL: redis://redis:6379/0
      ARQ_REDIS_URL: redis://redis:6379/1
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  webapp:
    build:
      context: .
      dockerfile: Dockerfile.webapp
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    network_mode: host
    restart: unless-stopped

volumes:
  pgdata:
